<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>take no bs for granted</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ url_for('static', filename='service-worker.js') }}", {scope: '/'})
                    .then(registration => console.log('ServiceWorker registered with scope:', registration.scope))
                    .catch(error => console.error('ServiceWorker registration failed:', error));
            });
        }
    </script>
</head>
<body>
    <div id="auth-container" class="auth-container">
        <div class="auth-box">
            <h2 class="auth-title">locktf</h2>
            <p id="auth-subtitle" class="auth-subtitle">Sign in to focus</p>
            <form id="auth-form" class="auth-form">
                <input type="text" id="auth-username" placeholder="Username" required class="auth-input">
                <input type="password" id="auth-password" placeholder="Password" required class="auth-input">
                <button type="submit" id="auth-submit-btn" class="auth-btn">Login</button>
            </form>
            <button id="auth-toggle-btn" class="auth-toggle-btn">Need an account? Register</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <header>
            <h1> locktf</h1>
        </header>

        <main>
            <div class="main-layout-container">
                <!-- To-Do list container -->
                <div class="todo-container">
                    <div class="todo-header">
                        <h4 class="todo-title">To-Do List</h4>
                    </div>
                    <ul id="todo-list" class="todo-list"></ul>
                    <div class="todo-input-container">
                        <input type="text" id="new-task-input" placeholder="Add a new task..." class="todo-input">
                        <button id="add-task-btn" class="todo-add-btn">+</button>
                    </div>
                    <!-- Motivational Quotes -->
                    <div class="quotes-container">
                        <p class="random-quote" id="random-quote"></p>
                        <p class="quote-author" id="quote-author"></p>
                    </div>
                </div>

                <div class="main-content-column">
                    <!-- Main Content featuring the Pomodoro Timer -->
                    <div class="centered-content">
                        <p>locktf - no bs</p>
                        <p>Current time: <span id="clock"></span></p>
                        <p>Day progress: <span id="progress"></span>%</p>
                    </div>

                    <div id="pomodoro-timer">
                        <div class="timer-display" id="timer-display">25:00</div>
                        <div class="timer-controls">
                            <button id="start-btn">Start</button>
                            <button id="pause-btn">Pause</button>
                            <button id="reset-btn">Reset</button>
                        </div>
                        <svg class="progress-ring" width="100" height="100">
                            <circle class="progress-ring-background" stroke="#333" stroke-width="8" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle class="progress-ring-circle" stroke="#FFFFFF" stroke-width="8" fill="transparent" r="40" cx="50" cy="50"/>
                        </svg>
                    </div>
                    
                    <!-- Minimalist Analytics Heatmap -->
                    <div class="heatmap-container">
                        <h4>Activity</h4>
                        <div id="heatmap" class="heatmap-grid"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            Code by <a href="https://github.com/19sx">19Sx</a>
        </footer>
    </div>

    <!-- Modularized JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
